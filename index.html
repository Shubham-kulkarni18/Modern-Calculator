<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Modern Calculator</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="calculator-container">
        
        <div class="history-panel">

            <div class="history-header">
                <h3>History</h3>

                <button id="clear-history">
                    Clear
                </button>

            </div>

            <div id="history-list">

                <p class="empty-history">
                    No calculations yet
                </p>

            </div>

        </div>

        <div class="calculator">

            <input
                type="text"
                id="display"
            >

            <div class="buttons">

                <button class="operator">AC</button>
                <button class="operator">DEL</button>
                <button class="operator">(</button>
                <button class="operator">)</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">/</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">*</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">-</button>

                <button>0</button>
                <button>.</button>
                <button>%</button>
                <button class="operator">+</button>

                <button class="equal">=</button>

            </div>

        </div>
    </div>

<script src="script.js"></script>
<script src="history.js"></script>

</body>
</html>
